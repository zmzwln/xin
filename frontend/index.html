<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心脏预警系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>
    
    <div class="main-app" id="mainApp">
        <nav class="top-nav">
            <div class="nav-left">
                <div class="brand">
                    <i class="fas fa-heartbeat"></i>
                    <span>心脏预警</span>
                </div>
                <div class="nav-links">
                    <div class="nav-item active" onclick="window.location.href='index.html'">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='survey.html'">
                        <i class="fas fa-file-alt"></i>
                        <span>问卷调查</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='chat.html'">
                        <i class="fas fa-comments"></i>
                        <span>AI交互</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='report.html'">
                        <i class="fas fa-file-medical"></i>
                        <span>个人主页</span>
                    </div>
                    <div class="nav-item" onclick="window.location.href='history.html'">
                        <i class="fas fa-history"></i>
                        <span>历史问卷</span>
                    </div>
                </div>
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div class="nav-right">
                <div class="user-menu">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span class="user-name" id="currentUser">用户</span>
                </div>
                <button class="btn-icon" onclick="logout()" title="退出登录">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </nav>
        
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-nav-links">
                <div class="mobile-nav-item active" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </div>
                <div class="mobile-nav-item" onclick="window.location.href='survey.html'">
                    <i class="fas fa-file-alt"></i>
                    <span>问卷调查</span>
                </div>
                <div class="mobile-nav-item" onclick="window.location.href='chat.html'">
                    <i class="fas fa-comments"></i>
                    <span>AI交互</span>
                </div>
                <div class="mobile-nav-item" onclick="window.location.href='report.html'">
                    <i class="fas fa-file-medical"></i>
                    <span>体检报告</span>
                </div>
                <div class="mobile-nav-item" onclick="window.location.href='history.html'">
                    <i class="fas fa-history"></i>
                    <span>历史问卷</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="page active" id="page-home">
                <div class="hero-section">
                    <div class="hero-content">
                        <div class="hero-icon">
                            <div class="heart-animation">
                                <i class="fas fa-heartbeat"></i>
                            </div>
                        </div>
                        <h1 class="hero-title">监测心脏健康，<span>预防胜于治疗</span></h1>
                        <p class="hero-subtitle">
                            基于人工智能的心脏病风险评估系统，通过分析您的健康数据，提供个性化
                            的风险预警和健康建议。
                        </p>
                        <div class="hero-features">
                            <div class="feature-item" onclick="goToChat()">
                                <i class="fas fa-chart-line"></i>
                                <span>AI风险评估</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-user-md"></i>
                                <span>专业健康建议</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-bell"></i>
                                <span>早期预警</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-database"></i>
                                <span>数据安全</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="news-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i class="fas fa-newspaper"></i>
                            健康资讯
                        </h2>
                        <div class="news-controls">
                            <button class="btn-icon" onclick="scrollNews(-1)">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <button class="btn-icon" onclick="scrollNews(1)">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                    <div class="news-scroll" id="newsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
