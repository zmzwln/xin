<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI交互</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
:root {
    --body-bg: #000;
    --ai-msg-bg: #222;
    --text-color: #fff;
    --header-bg: #000;
    --footer-bg: #000;
    --input-bg: #111;
}
html[data-theme="light"] {
    --body-bg: #fff;
    --ai-msg-bg: #f1f1f1;
    --text-color: #000;
    --header-bg: #fff;
    --footer-bg: #fff;
    --input-bg: #f9f9f9;
}
body{
    background: var(--body-bg);
    color: var(--text-color);
    height: 100vh;
    display:flex;
    flex-direction:column;
    transition: all 0.3s ease;
}
.logo-box{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;padding:20px 0}
.logo{width:130px;height:130px;border-radius:50%;object-fit:cover;animation:beat 1.8s infinite ease-in-out;border:2px solid red}
@keyframes beat{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.chat-header{height:65px;background:var(--header-bg);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:20px;border-bottom:1px solid red}
.chat-container{flex:1;overflow-y:auto;padding:25px 20px 130px;max-width:800px;margin:0 auto;width:100%}
.chat-container::-webkit-scrollbar{width:5px}
.chat-container::-webkit-scrollbar-thumb{background:red;border-radius:10px}
.msg-item{margin-bottom:18px;display:flex}
.user-msg{justify-content:flex-end}
.ai-msg{justify-content:flex-start}
.msg-bubble{max-width:78%;padding:14px 18px;border-radius:18px;font-size:15px;line-height:1.6}
.user-msg .msg-bubble{background:red;color:#fff;border-bottom-right-radius:6px}
.ai-msg .msg-bubble{
    background:var(--ai-msg-bg);
    color:var(--text-color);
    border-bottom-left-radius:6px;
}
.chat-footer{position:fixed;bottom:0;left:0;right:0;background:var(--footer-bg);padding:18px 25px;border-top:1px solid red}
.input-box{max-width:800px;margin:0 auto;display:flex;gap:12px;align-items:flex-end}
textarea{
    flex:1;
    background:var(--input-bg);
    border:1px solid red;
    border-radius:18px;
    padding:16px 18px;
    color:var(--text-color);
    font-size:16px;
    resize:none;
    height:70px;
    outline:none;
}
button{background:red;color:#fff;border:none;border-radius:16px;padding:0 22px;height:70px;cursor:pointer;font-size:16px}
button:hover{background:#cc0000}
.back-btn{background:transparent;color:red;border:1px solid red;border-radius:8px;padding:6px 12px;height:auto;cursor:pointer}
.back-btn:hover{background:red;color:white}
.toggle-btn{margin-left:10px;background:transparent;color:red;border:1px solid red;border-radius:8px;padding:6px 12px;height:auto;cursor:pointer}
.toggle-btn:hover{background:red;color:white}
</style>
</head>
<body>

<div class="logo-box">
<img class="logo" src="logo.png">
</div>

<div class="chat-header">
<div>
<button class="back-btn" onclick="location.href='index.html'">退出到首页</button>
<button class="toggle-btn" onclick="toggleTheme()">切换背景</button>
</div>
<div>心血管智能助手</div>
</div>

<div class="chat-container" id="chatBox"></div>

<div class="chat-footer">
<div class="input-box">
<textarea id="inputText" placeholder="发送消息..."></textarea>
<button onclick="send()">发送</button>
</div>
</div>

<script>
const chatBox=document.getElementById('chatBox')
const input=document.getElementById('inputText')

function addMsg(cls,text){
    const div=document.createElement('div')
    div.className='msg-item '+cls
    div.innerHTML=`<div class="msg-bubble">${text}</div>`
    chatBox.appendChild(div)
    chatBox.scrollTop=chatBox.scrollHeight
}

function send(){
    const val=input.value.trim()
    if(!val)return
    addMsg('user-msg',val)
    input.value=''
    setTimeout(()=>{
        addMsg('ai-msg','已收到，正在处理...')
    },700)
}


function initTheme() {
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
}

function toggleTheme() {
    const html = document.documentElement;
    let current = html.getAttribute('data-theme');
    let next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
}

input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
})

window.onload = initTheme;
</script>
</body>
</html>
