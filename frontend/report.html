<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个人主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
:root {
    --body-bg: #000;
    --card-bg: #222;
    --text-color: #fff;
    --border-color: red;
    --input-bg: #111;
}
html[data-theme="light"] {
    --body-bg: #fff;
    --card-bg: #f1f1f1;
    --text-color: #000;
    --border-color: red;
    --input-bg: #f9f9f9;
}
body{
    background: var(--body-bg);
    color: var(--text-color);
    min-height: 100vh;
    transition: all 0.3s ease;
    padding-bottom: 40px;
}
.header{
    height:65px;
    background:var(--body-bg);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    font-size:20px;
    border-bottom:1px solid var(--border-color);
    position:sticky;
    top:0;
    z-index:10;
}
.back-btn{
    background:transparent;
    color:red;
    border:1px solid red;
    border-radius:8px;
    padding:6px 12px;
    cursor:pointer;
}
.back-btn:hover{background:red;color:white}
.toggle-btn{
    margin-left:10px;
    background:transparent;
    color:red;
    border:1px solid red;
    border-radius:8px;
    padding:6px 12px;
    cursor:pointer;
}
.toggle-btn:hover{background:red;color:white}
.container{
    max-width:800px;
    margin:30px auto;
    padding:0 20px;
}
.title{
    font-size:24px;
    margin-bottom:24px;
    text-align:center;
}
.card{
    background:var(--card-bg);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    border:1px solid var(--border-color);
}
.card h3{
    margin-bottom:12px;
    color:red;
}
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 0;
    border-bottom:1px solid #444;
}
html[data-theme="light"] .item{
    border-color:#ddd;
}
.item:last-child{border:none}
.label{font-weight:500}
.value{color:var(--text-color)}
.badge{
    padding:4px 10px;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
}
.badge.bind{background:#00c853;color:#fff}
.badge.unbind{background:#ff5252;color:#fff}
.btn{
    background:red;
    color:#fff;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
}
.btn:hover{background:#cc0000}
input{
    background:var(--input-bg);
    color:var(--text-color);
    border:1px solid var(--border-color);
    padding:8px 12px;
    border-radius:8px;
    outline:none;
}
</style>
</head>

<body>

<div class="header">
    <div>
        <button class="back-btn" onclick="location.href='index.html'">返回首页</button>
        <button class="toggle-btn" onclick="toggleTheme()">切换背景</button>
    </div>
    <div>个人主页</div>
</div>

<div class="container">
    <div class="title">个人信息中心</div>

    <div class="card">
        <h3>账号信息</h3>
        <div class="item">
            <div class="label">用户名</div>
            <div class="value">心脏健康用户</div>
        </div>
        <div class="item">
            <div class="label">密码</div>
            <div>
                <input type="password" value="123456" readonly>
                <button class="btn" style="margin-left:8px">修改</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>体检报告</h3>
        <div class="item">
            <div class="label">最新报告</div>
            <button class="btn">查看报告</button>
        </div>
    </div>

    <div class="card">
        <h3>设备绑定</h3>
        <div class="item">
            <div class="label">电子手环/手表</div>
            <div>
                <span class="badge bind">已绑定</span>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>紧急联系人</h3>
        <div class="item">
            <div class="label">联系人状态</div>
            <div>
                <span class="badge unbind">未添加</span>
                <button class="btn" style="margin-left:8px">添加</button>
            </div>
        </div>
    </div>
</div>

<script>
// 全局主题同步
function initTheme() {
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
}

function toggleTheme() {
    const html = document.documentElement;
    let current = html.getAttribute('data-theme');
    let next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
}

window.onload = initTheme;
</script>

</body>
</html>
